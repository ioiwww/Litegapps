name: Build Custom LiteGapps (Android 16)

on:
  [workflow_dispatch,push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl java-common default-jdk tar

      - name: Restore Binaries
        run: |
          chmod -R 755 .
          ./build.sh restore

      - name: Force Fix Structure
        run: |
          mkdir -p core/litegapps/core/arm64
          mkdir -p output
          mkdir -p log
          
          # كتابة الإعدادات بسطور منفصلة لضمان القبول
          echo "version=1.0" > config
          echo "version.code=36" >> config
          echo "codename=Linkit_Clean_OS" >> config
          echo "name.builder=Linkit_Dev" >> config
          echo "set.time.stamp=true" >> config
          echo "date.time=$(date +'%Y%m%d%H%M')" >> config
          echo "compression=br" >> config
          echo "compression.level=9" >> config
          echo "zip.level=9" >> config
          echo "zip.signer=false" >> config
          echo "build.status=official" >> config
          echo "litegapps.build=true" >> config
          
          cp config core/litegapps/config
          cp config core/litegapps/core/config
          cp config core/litegapps/core/arm64/config

      - name: Execute Build
        run: |
          chmod +x build.sh
          ./build.sh m litegapps core arm64 36

      - name: Debug Output
        if: always()
        run: |
          echo "==== LOGS ===="
          cat log/make.log || echo "No logs"
          echo "==== FILES ===="
          ls -R output/

      - name: Upload GApps
        uses: actions/upload-artifact@v4
        with:
          name: LiteGapps-Core-A16
          path: output/
