name: Build Custom LiteGapps (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl java-common default-jdk tar

      - name: Restore Binaries & Dependencies
        run: |
          chmod -R 755 .
          ./build.sh restore

      - name: Prepare Config Structure
        run: |
          # بناء المجلدات المطلوبة لتجنب خطأ grep
          mkdir -p core/litegapps/core
          mkdir -p output
          mkdir -p log
          
          # كتابة الإعدادات عبر echo لتجنب أي أخطاء YML مع الـ EOF
          echo "version=1.0" > config
          echo "version.code=36" >> config
          echo "codename=Linkit_Clean_OS" >> config
          echo "name.builder=Linkit_Dev" >> config
          echo "set.time.stamp=true" >> config
          echo "date.time=$(date +'%Y%m%d%H%M')" >> config
          echo "compression=br" >> config
          echo "compression.level=9" >> config
          echo "zip.level=9" >> config
          echo "zip.signer=false" >> config
          echo "build.status=litegapps" >> config
          echo "litegapps.build=true" >> config
          
          # نسخ الإعدادات للمسارات التي يطلبها السكريبت
          cp config core/litegapps/core/config
          cp config core/litegapps/config

      - name: Execute Build
        run: |
          # إعطاء الصلاحية وتنفيذ البناء
          chmod +x build.sh
          ./build.sh m core arm64 36

      - name: Debug Output
        if: always()
        run: |
          echo "Checking Logs if build failed:"
          [ -f log/make.log ] && cat log/make.log || echo "No logs found"
          echo "Listing Output:"
          ls -R output/ || echo "Output folder empty"

      - name: Upload Flashable GApps
        uses: actions/upload-artifact@v4
        with:
          name: LiteGapps-Core-A16-Linkit
          path: output/*.zip
          if-no-files-found: warn
